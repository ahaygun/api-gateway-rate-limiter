server:
  addr: ":8080"
  read_timeout: 5s
  write_timeout: 10s

ratelimit:
  backend: memory        # "memory" (single instance) or "redis" (distributed)
  redis_addr: localhost:6379

upstreams:
  - name: sms-service
    target: "http://localhost:9001"
    timeout: 3s
    retry:                 # only safe (GET/HEAD) requests are retried
      max_attempts: 2      # extra attempts after the first
      backoff: 50ms        # doubled each attempt
    circuit_breaker:
      failure_threshold: 5 # open after 5 consecutive failures
      cooldown: 5s         # reject fast for 5s, then probe with one trial

routes:
  - path_prefix: /v1/sms
    upstream: sms-service
    methods: [GET, POST]

plans:                   # rate = tokens per second, burst = bucket capacity
  free:
    rate: 5
    burst: 10
  pro:
    rate: 100
    burst: 200

clients:
  - api_key: "demo-free-key"
    name: "acme-free"
    plan: free
  - api_key: "demo-pro-key"
    name: "globex-pro"
    plan: pro
