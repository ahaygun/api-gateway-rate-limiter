server:
  addr: ":8080"
  read_timeout: 5s
  write_timeout: 10s

ratelimit:
  backend: memory        # "memory" (single instance) or "redis" (distributed)
  redis_addr: localhost:6379

upstreams:
  - name: sms-service
    target: "http://localhost:9001"
    timeout: 3s

routes:
  - path_prefix: /v1/sms
    upstream: sms-service
    methods: [GET, POST]

plans:                   # rate = tokens per second, burst = bucket capacity
  free:
    rate: 5
    burst: 10
  pro:
    rate: 100
    burst: 200

clients:
  - api_key: "demo-free-key"
    name: "acme-free"
    plan: free
  - api_key: "demo-pro-key"
    name: "globex-pro"
    plan: pro
